SecretProviderClass:
- name: youpayroll-envs
  namespace: youpayroll
  provider: vault
  parameters:
    roleName: "ygg-eks-youpayroll-app-role"
    objects: |
      - objectName: "application.env"
        secretPath: "ygag-secrets/data/<PRODUCT_TEAM>/sandbox/youpayroll/env-uae"
        secretKey: "app-env"
      - objectName: "application-devops.env"
        secretPath: "ygag-secrets/data/devops/sandbox/external/<PRODUCT_TEAM>/youpayroll/env-uae"
        secretKey: "app-env"

- name: youpayroll-certs-sample1
  namespace: youpayroll
  provider: vault
  parameters:
    roleName: "ygg-eks-youpayroll-app-role"
    objects: |
      - objectName: "certificate.pem"
        secretPath: "ygag-secrets/data/<PRODUCT_TEAM>/sandbox/youpayroll/certs-sample1"
        secretKey: "certificate.pem"
      - objectName: "private.key"
        secretPath: "ygag-secrets/data/<PRODUCT_TEAM>/sandbox/youpayroll/certs-sample1"
        secretKey: "private.key"

