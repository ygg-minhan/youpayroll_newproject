name: Renew QA Deployment
run-name: Renewing youpayroll ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch'
        required: true
        type: string

jobs:
  deploy:
    name: QA
    uses: YouGotaGift/devops-organization-actions/.github/workflows/qa-renew-deployed-app.yml@main
    with:
      application_name: youpayroll
      branch: ${{ inputs.branch }}
    secrets: inherit