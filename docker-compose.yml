version: "3.9"

services:
  redis:
    image: redis:alpine
  web:
    restart: unless-stopped
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/youpayroll
    ports:
      - "8000:8000"
    depends_on:
      - redis
  celery:
    build: .
    command: celery -A youpayroll worker -l info -B
    volumes:
      - .:/youpayroll
    depends_on:
      - web
      - redis
